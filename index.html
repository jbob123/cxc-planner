<html lang="en">
<head>

<title>CxC Travel вҖ” Trip Planner</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--navy:#0B1426;--gold:#C9A455;--gold2:#DFC07A;--cream:#F5F0E8;--gray:#6b7280;--dark2:#152035}
body{font-family:'Nunito Sans',sans-serif;background:var(--navy);height:100svh;display:flex;flex-direction:column;overflow:hidden}

/* в”Җв”Җ HEADER в”Җв”Җ */
.header{background:var(--navy);border-bottom:1px solid rgba(201,164,85,.22);padding:.8rem 1.2rem;display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.logo{font-family:'Cormorant Garamond',serif;font-size:1.35rem;font-weight:700;color:#fff;letter-spacing:.04em}
.logo span{color:var(--gold)}
.header-r{display:flex;align-items:center;gap:.75rem}
.pkg-btn{background:rgba(201,164,85,.13);color:var(--gold);border:1px solid rgba(201,164,85,.3);border-radius:20px;padding:.35rem .85rem;font-size:.76rem;font-weight:700;cursor:pointer;letter-spacing:.05em;text-transform:uppercase;transition:all .2s}
.pkg-btn:hover{background:rgba(201,164,85,.25)}
.hdr-link{color:rgba(255,255,255,.45);font-size:.76rem;text-decoration:none;font-weight:600;transition:color .2s}
.hdr-link:hover{color:var(--gold)}

/* в”Җв”Җ CHAT в”Җв”Җ */
.chat{flex:1;overflow-y:auto;padding:1.1rem 1rem;display:flex;flex-direction:column;gap:.8rem;max-width:800px;width:100%;margin:0 auto}
.chat::-webkit-scrollbar{width:4px}
.chat::-webkit-scrollbar-thumb{background:rgba(201,164,85,.25);border-radius:2px}

.msg{display:flex;gap:.6rem;animation:pop .22s ease-out}
.msg.user{flex-direction:row-reverse}
.av{width:27px;height:27px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.65rem;font-weight:800;margin-top:3px}
.msg.bot .av{background:var(--gold);color:var(--navy)}
.msg.user .av{background:rgba(255,255,255,.1);font-size:.85rem}
.bub{padding:.7rem .95rem;border-radius:16px;max-width:86%;font-size:.875rem;line-height:1.65;white-space:pre-wrap}
.msg.bot .bub{background:rgba(255,255,255,.068);color:rgba(255,255,255,.9);border:1px solid rgba(255,255,255,.07);border-radius:4px 16px 16px 16px}
.msg.user .bub{background:var(--gold);color:var(--navy);font-weight:600;border-radius:16px 4px 16px 16px}

/* cards */
.cards{display:flex;flex-direction:column;gap:.45rem;padding-left:2.1rem;animation:pop .28s ease-out}
.card{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.09);border-radius:10px;padding:.75rem .95rem}
.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:.5rem;margin-bottom:.18rem}
.card-name{font-weight:700;color:#fff;font-size:.85rem}
.card-badge{background:var(--gold);color:var(--navy);font-size:.6rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:.14rem .45rem;border-radius:10px;flex-shrink:0;white-space:nowrap}
.card-sub{color:var(--gold2);font-size:.75rem;font-weight:600;margin-bottom:.15rem}
.card-note{color:rgba(255,255,255,.5);font-size:.75rem;line-height:1.5}

/* quick replies */
.qrs{display:flex;flex-wrap:wrap;gap:.38rem;padding-left:2.1rem;animation:pop .28s ease-out}
.qr{background:rgba(201,164,85,.09);color:var(--gold);border:1px solid rgba(201,164,85,.22);border-radius:18px;padding:.3rem .78rem;font-size:.77rem;cursor:pointer;font-weight:600;transition:all .2s;white-space:nowrap}
.qr:hover{background:rgba(201,164,85,.22)}

/* connect banner */
.connect{background:linear-gradient(135deg,rgba(201,164,85,.13),rgba(201,164,85,.05));border:1px solid rgba(201,164,85,.28);border-radius:12px;padding:.85rem 1rem;animation:pop .3s ease-out}
.connect p{color:rgba(255,255,255,.83);font-size:.84rem;margin-bottom:.55rem;line-height:1.55}
.connect-btns{display:flex;gap:.45rem;flex-wrap:wrap}
.cbtn{background:var(--gold);color:var(--navy);border:none;border-radius:6px;padding:.44rem .95rem;font-weight:700;font-size:.77rem;cursor:pointer;transition:background .2s}
.cbtn:hover{background:var(--gold2)}
.cbtn-o{background:transparent;color:var(--gold);border:1px solid rgba(201,164,85,.45);border-radius:6px;padding:.44rem .95rem;font-weight:700;font-size:.77rem;text-decoration:none;display:inline-flex;align-items:center;cursor:pointer}

/* lead collecting inline */
.lead-prompt{background:rgba(201,164,85,.08);border:1px solid rgba(201,164,85,.2);border-radius:12px;padding:.8rem 1rem;animation:pop .3s ease-out;font-size:.84rem;color:rgba(255,255,255,.85);line-height:1.55}
.lead-done{background:rgba(50,200,100,.08);border:1px solid rgba(50,200,100,.2);border-radius:12px;padding:1rem;animation:pop .3s ease-out}
.lead-done h4{font-family:'Cormorant Garamond',serif;font-size:1.2rem;color:#fff;margin-bottom:.4rem}
.lead-done p{color:rgba(255,255,255,.65);font-size:.82rem;line-height:1.6}
.lead-done .ck{font-size:1.6rem;margin-bottom:.35rem}
.contact-line{margin-top:.6rem;font-size:.8rem;color:rgba(255,255,255,.45)}
.contact-line a{color:var(--gold);text-decoration:none}

/* в”Җв”Җ INPUT в”Җв”Җ */
.input-wrap{padding:.6rem .9rem .85rem;max-width:800px;width:100%;margin:0 auto;flex-shrink:0}
.input-bar{background:rgba(255,255,255,.055);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:.45rem .45rem .45rem .85rem;display:flex;gap:.45rem;align-items:center}
.input-bar input{flex:1;background:transparent;border:none;color:#fff;font-family:'Nunito Sans',sans-serif;font-size:.875rem;outline:none}
.input-bar input::placeholder{color:rgba(255,255,255,.28)}
.send{background:var(--gold);color:var(--navy);border:none;border-radius:9px;width:34px;height:34px;cursor:pointer;font-size:1rem;font-weight:700;transition:background .2s;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.send:hover:not(:disabled){background:var(--gold2)}
.send:disabled{opacity:.3;cursor:not-allowed}

/* в”Җв”Җ PACKAGES PANEL в”Җв”Җ */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:50;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
.panel{background:#162033;border-radius:16px 16px 0 0;max-width:680px;width:100%;max-height:88vh;overflow-y:auto;padding:1.4rem}
.panel-hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:1.1rem}
.panel-hd h2{font-family:'Cormorant Garamond',serif;font-size:1.45rem;color:#fff;font-weight:700}
.x-btn{background:rgba(255,255,255,.09);border:none;color:#fff;width:30px;height:30px;border-radius:50%;cursor:pointer;font-size:.95rem}
.pkg-card{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.09);border-radius:12px;padding:1rem;margin-bottom:.8rem;cursor:pointer;transition:all .2s}
.pkg-card:hover{background:rgba(255,255,255,.08)}
.pkg-cat{font-size:.62rem;font-weight:700;letter-spacing:.12em;text-transform:uppercase;color:var(--gold);margin-bottom:.35rem}
.pkg-name{font-family:'Cormorant Garamond',serif;font-size:1.15rem;font-weight:600;color:#fff;margin-bottom:.2rem}
.pkg-meta{font-size:.77rem;color:rgba(255,255,255,.4);margin-bottom:.55rem}
.pkg-hl{list-style:none;margin-bottom:.65rem}
.pkg-hl li{font-size:.77rem;color:rgba(255,255,255,.68);padding:.12rem 0;display:flex;gap:.38rem}
.pkg-hl li::before{content:'вң“';color:var(--gold);flex-shrink:0;font-weight:700}
.pkg-pr-row{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:.5rem}
.pkg-pr{font-family:'Cormorant Garamond',serif;font-size:1.3rem;font-weight:700;color:#fff}
.ask-btn{background:var(--gold);color:var(--navy);border:none;border-radius:6px;padding:.4rem .85rem;font-weight:700;font-size:.75rem;cursor:pointer}
.ask-btn:hover{background:var(--gold2)}

@keyframes pop{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:480px){.bub{max-width:92%}.hdr-link{display:none}}
</style>
</head>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
// в”Җв”Җ CONSTANTS в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const CXC_PHONE = "412-420-6826";
const CXC_EMAIL = "cxctravel412@gmail.com";

// в”Җв”Җ STATE в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
// mode: 'chat' | 'quiz' | 'lead'
let mode = 'chat';
let currentDest = null;
let msgCount = 0;
let connectShown = false;
let chatLog = [];   // {role, text} full history for lead summary

// Quiz state
let quizStep = 0;
let quizAnswers = {};

// Lead state
let leadStep = 0;
let leadData = {};
const LEAD_QUESTIONS = [
  { key:'name',   ask:"What's your name?" },
  { key:'email',  ask:"Great! And your email address?" },
  { key:'phone',  ask:"Best phone number to reach you?" },
  { key:'dates',  ask:"When are you thinking of traveling? (Even a rough month or season works!)" },
  { key:'people', ask:"Last one вҖ” how many people total in your group?" }
];

// в”Җв”Җ QUIZ FLOW в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
const QUIZ = [
  {
    q: "Let's find your perfect trip! First вҖ” what kind of experience matters most to you?",
    opts: ["рҹҸ–пёҸ Beach & Relaxation","вӣі Golf","рҹҸҷпёҸ City, Food & Culture","рҹҢҝ Nature & Adventure","рҹ’• Romance / Honeymoon","рҹ‘ЁвҖҚрҹ‘©вҖҚрҹ‘§ Family with Kids","рҹҺү Group Party / Event"]
  },
  {
    q: "How far are you open to traveling?",
    opts: ["рҹҮәрҹҮё USA / Canada only","рҹҢҙ Caribbean or Mexico","рҹҢҚ Anywhere вҖ” the farther the better"]
  },
  {
    q: "What's your rough budget per person, per night?",
    opts: ["рҹ’° Value (under $200/night)","рҹ’°рҹ’° Mid-range ($200вҖ“$400/night)","рҹ’°рҹ’°рҹ’° Luxury ($400вҖ“$800/night)","рҹ‘‘ Ultra-luxury (sky's the limit)"]
  },
  {
    q: "When are you thinking of going?",
    opts: ["Next 3 months","3вҖ“6 months out","6вҖ“12 months out","Just exploring ideas for now"]
  }
];

function startQuiz() {
  mode = 'quiz';
  quizStep = 0;
  quizAnswers = {};
  askQuiz();
}

function askQuiz() {
  const q = QUIZ[quizStep];
  botMsg(q.q, q.opts.map(o => ({label:o, action:()=>quizAnswer(o)})));
}

function quizAnswer(val) {
  removeQRs();
  userMsg(val);
  quizAnswers[quizStep] = val;
  quizStep++;
  if (quizStep < QUIZ.length) {
    setTimeout(askQuiz, 350);
  } else {
    setTimeout(deliverRecommendations, 400);
  }
}

function deliverRecommendations() {
  mode = 'chat';
  const type   = quizAnswers[0] || '';
  const range  = quizAnswers[1] || '';
  const budget = quizAnswers[2] || '';

  // Build destination shortlist based on answers
  let recs = [];

  // Golf
  if (type.includes('Golf')) {
    if (range.includes('Anywhere') || range.includes('far')) recs = ['bandondunes','irelandscotland','pebblebeach'];
    else if (range.includes('Caribbean') || range.includes('Mexico')) recs = ['cabo','scottsdale','myrtlebeach'];
    else recs = ['scottsdale','myrtlebeach','pinehurst'];
  }
  // Romance / Honeymoon
  else if (type.includes('Romance') || type.includes('Honeymoon')) {
    if (range.includes('Anywhere')) recs = ['italy','greece','bali'];
    else if (range.includes('Caribbean')) recs = ['aruba','stlucia','turksandcaicos'];
    else recs = ['napa','sedona','keys'];
  }
  // Family
  else if (type.includes('Family')) {
    if (range.includes('Caribbean') || range.includes('Mexico')) recs = ['cancun','bahamas','puntacana'];
    else if (range.includes('Anywhere')) recs = ['japan','costarica','orlando'];
    else recs = ['orlando','lasvegas','nashville'];
  }
  // Group / Party
  else if (type.includes('Group') || type.includes('Party')) {
    if (range.includes('Caribbean') || range.includes('Mexico')) recs = ['cancun','jamaica','cabo'];
    else recs = ['lasvegas','nashville','neworleans'];
  }
  // Nature / Adventure
  else if (type.includes('Nature') || type.includes('Adventure')) {
    if (range.includes('Anywhere')) recs = ['iceland','costarica','peru'];
    else recs = ['hawaii','colorado','sedona'];
  }
  // City / Food / Culture
  else if (type.includes('City') || type.includes('Food') || type.includes('Culture')) {
    if (range.includes('Anywhere')) recs = ['japan','morocco','peru'];
    else if (range.includes('Caribbean') || range.includes('Mexico')) recs = ['puertorico','neworleans','charleston'];
    else recs = ['nyc','neworleans','nashville'];
  }
  // Beach & Relaxation
  else {
    if (range.includes('Anywhere')) recs = ['bali','turksandcaicos','barbados'];
    else if (range.includes('Caribbean') || range.includes('Mexico')) recs = ['aruba','turksandcaicos','stlucia'];
    else recs = ['keys','hawaii','miami'];
  }

  // Filter to valid KB keys
  recs = recs.filter(k => KB[k]);
  if (!recs.length) recs = ['aruba','cancun','lasvegas'];

  const intro = `Based on what you told me, here are my top ${recs.length} picks for you вҖ” let me know which one catches your eye and I'll go deep on it!`;
  const recText = recs.map((k,i) => {
    const d = KB[k];
    return `${i+1}. ${d.emoji} **${d.label}**\n${d.vibe.split('.')[0] + '.'}`;
  }).join('\n\n');

  botMsg(intro + '\n\n' + recText, recs.map(k => ({label: KB[k].emoji+' '+KB[k].label, action:()=>sendText(KB[k].label)})));
  currentDest = recs[0];
  maybeShowConnect();
}

// в”Җв”Җ LEAD COLLECTION в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function startLead(interestHint) {
  mode = 'lead';
  leadStep = 0;
  leadData = { interest: interestHint || currentDest ? (KB[currentDest]||{}).label || '' : '' };
  logChat('bot', "I'd love to connect you with Jesse and Sam вҖ” they'll reach out personally with options and pricing.");
  botMsg("I'd love to connect you with Jesse and Sam вҖ” they'll reach out personally with options and pricing.\n\nLet me grab a few quick details...\n\n" + LEAD_QUESTIONS[0].ask);
}

function advanceLead(userInput) {
  const q = LEAD_QUESTIONS[leadStep];
  leadData[q.key] = userInput;
  leadStep++;

  if (leadStep < LEAD_QUESTIONS.length) {
    setTimeout(()=> botMsg(LEAD_QUESTIONS[leadStep].ask), 300);
  } else {
    setTimeout(finishLead, 300);
  }
}

function finishLead() {
  mode = 'chat';
  // Build chat summary
  const dest = currentDest && KB[currentDest] ? KB[currentDest].label : 'Not specified';
  const summary = buildChatSummary();

  // Save lead locally
  const lead = { ...leadData, dest, summary, timestamp: new Date().toISOString() };
  const stored = JSON.parse(localStorage.getItem('cxc_leads')||'[]');
  stored.push(lead);
  localStorage.setItem('cxc_leads', JSON.stringify(stored));

  // Show confirmation
  const el = document.createElement('div');
  el.className = 'lead-done';
  el.innerHTML = `
    <div class="ck">вң…</div>
    <h4>You're all set, ${leadData.name}!</h4>
    <p>Jesse or Sam will reach out to <strong>${leadData.email}</strong> вҖ” usually within a few hours.</p>
    <p style="margin-top:.45rem">Here's a recap of your inquiry:</p>
    <p style="margin-top:.35rem;color:rgba(255,255,255,.55);font-size:.79rem">
      рҹ“… Travel dates: ${leadData.dates}<br/>
      рҹ‘Ҙ Group size: ${leadData.people}<br/>
      рҹҢҚ Destination interest: ${dest}
    </p>
    <div class="contact-line">Prefer to reach out directly? <a href="tel:${CXC_PHONE}">${CXC_PHONE}</a> &nbsp;В·&nbsp; <a href="mailto:${CXC_EMAIL}">${CXC_EMAIL}</a></div>`;
  document.getElementById('chat').appendChild(el);
  scrollBot();

  botMsg("Is there anything else you'd like to explore while you wait to hear from them? I can go deeper on any destination вҖ” hotels, specific activities, restaurant picks, what to pack for the season...");
}

function buildChatSummary() {
  return chatLog.map(m => (m.role==='user'?'Customer: ':'Bot: ') + m.text).join('\n');
}

// в”Җв”Җ VAGUE DESTINATION DETECTION в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function isVague(text) {
  return /where should (i|we)|where (to|do i|can i)|suggest|recommend|not sure|help me (decide|choose|pick)|best (place|destination|spot)|ideas?|options?\??|what('s| is) (good|nice|best|popular)|don'?t know where|anywhere good|can't decide|can not decide/i.test(text);
}

function isBookingReady(text) {
  return /\b(book|ready|contact|reach out|call me|email me|sign up|sign me up|let'?s do it|let'?s go|i('m| am) (in|ready|interested)|how do i (book|get started)|get started|set it up|connect me|talk to (jesse|sam|someone|an agent)|speak with|get a quote|plan my trip|move forward)\b|jesse\s*&\s*sam|connect with cxc/i.test(text);
}

function isNonTravel(text) {
  const lo = text.toLowerCase();
  // Clearly non-travel topics with no travel context
  if (/\b(recipe|how to cook|bake a|coding|javascript error|python script|calcul(ate|ation)|math problem|solve for|sports score|stock (price|market)|who won|weather forecast|news today|political|write me a (poem|song|essay)|homework help|medical symptom|legal advice)\b/i.test(lo)) {
    // Make sure there's no travel angle
    if (!/\b(hotel|resort|flight|trip|travel|vacation|destination|visit|cruise|booking|passport|visa|itinerary|airport)\b/i.test(lo)) return true;
  }
  return false;
}

function detectCompare(text) {
  const lo = text.toLowerCase();
  if (!/\bvs\.?\b|\bversus\b|\bor\b|\bcompare\b|\bwhich (is|should)\b|\bbetter\b|\bdifference\b/i.test(lo)) return null;
  const found = [];
  for (const [d, ks] of Object.entries(DEST_KEYS)) {
    if (ks.some(k => lo.includes(k))) { found.push(d); if (found.length === 2) break; }
  }
  return found.length === 2 ? found : null;
}

// в”Җв”Җ KEYWORD DETECTION в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function detectDest(t) {
  const lo = t.toLowerCase();
  for (const [d,ks] of Object.entries(DEST_KEYS)) if (ks.some(k=>lo.includes(k))) return d;
  return null;
}
function detectCat(t) {
  const lo = t.toLowerCase();
  for (const [c,ks] of Object.entries(CAT_KEYS)) if (ks.some(k=>lo.includes(k))) return c;
  return null;
}

// в”Җв”Җ UI RENDERING в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function el(id){return document.getElementById(id)}
function scrollBot(){const c=el('chat');c.scrollTop=c.scrollHeight}

function logChat(role,text){chatLog.push({role,text:text.replace(/\*\*(.*?)\*\*/g,'$1')})}

function botMsg(text, buttons) {
  logChat('bot', text);
  removeQRs();
  const wrap = document.createElement('div');
  wrap.className = 'msg bot';
  wrap.innerHTML = `<div class="av">CxC</div><div class="bub">${fmt(text)}</div>`;
  el('chat').appendChild(wrap);
  if (buttons && buttons.length) {
    const row = document.createElement('div');
    row.className = 'qrs';
    buttons.forEach(b => {
      const btn = document.createElement('button');
      btn.className = 'qr';
      btn.textContent = b.label;
      btn.onclick = () => { removeQRs(); b.action(); };
      row.appendChild(btn);
    });
    el('chat').appendChild(row);
  }
  scrollBot();
}

function userMsg(text) {
  logChat('user', text);
  const wrap = document.createElement('div');
  wrap.className = 'msg user';
  wrap.innerHTML = `<div class="av">рҹ‘Ө</div><div class="bub">${esc(text)}</div>`;
  el('chat').appendChild(wrap);
  scrollBot();
}

function addCards(cards) {
  if (!cards||!cards.length) return;
  const wrap = document.createElement('div');
  wrap.className = 'cards';
  wrap.innerHTML = cards.map(c=>`
    <div class="card">
      <div class="card-top"><span class="card-name">${esc(c.name)}</span>${c.badge?`<span class="card-badge">${esc(c.badge)}</span>`:''}</div>
      ${c.sub?`<div class="card-sub">${esc(c.sub)}</div>`:''}
      ${c.note?`<div class="card-note">${esc(c.note)}</div>`:''}
    </div>`).join('');
  el('chat').appendChild(wrap);
  scrollBot();
}

function addQRs(opts) {
  if (!opts||!opts.length) return;
  const row = document.createElement('div');
  row.className = 'qrs';
  opts.forEach(label => {
    const btn = document.createElement('button');
    btn.className = 'qr';
    btn.textContent = label;
    btn.onclick = () => sendText(label);
    row.appendChild(btn);
  });
  el('chat').appendChild(row);
  scrollBot();
}

function removeQRs() {
  document.querySelectorAll('.qrs').forEach(e=>e.remove());
}

function maybeShowConnect() {
  if (connectShown) return;
  if (msgCount < 3 && !currentDest) return;
  connectShown = true;
  const wrap = document.createElement('div');
  wrap.className = 'connect';
  wrap.innerHTML = `
    <p>вңҰ Jesse and Sam can take everything from here вҖ” personalized options, perks you won't find online, and pricing that's often better than booking direct. They respond fast.</p>
    <div class="connect-btns">
      <button class="cbtn" onclick="startLead()">Connect with CxC вҶ’</button>
      <a class="cbtn-o" href="tel:${CXC_PHONE}">рҹ“һ ${CXC_PHONE}</a>
      <a class="cbtn-o" href="mailto:${CXC_EMAIL}">вңүпёҸ Email</a>
    </div>`;
  el('chat').appendChild(wrap);
  scrollBot();
}

// в”Җв”Җ TEXT FORMATTING в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmt(s){
  return esc(s)
    .replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br/>');
}

// в”Җв”Җ SEND в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
function sendText(t) { el('inp').value=''; processText(t); }

function send() {
  const t = el('inp').value.trim();
  if (!t) return;
  el('inp').value = '';
  el('sendBtn').disabled = true;
  processText(t);
}

function processText(text) {
  removeQRs();
  userMsg(text);
  msgCount++;
  setTimeout(() => {
    const reply = getReply(text);
    if (reply) {
      botMsg(reply.text, null);
      if (reply.cards) addCards(reply.cards);
      if (reply.qrs && reply.qrs.length) addQRs(reply.qrs);
    }
    maybeShowConnect();
  }, 280);
}

el('inp').addEventListener('input', function(){ el('sendBtn').disabled = !this.value.trim(); });

// в”Җв”Җ PACKAGES в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җ
